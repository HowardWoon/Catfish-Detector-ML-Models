{% extends "base.html" %}

{% block content %}
<main class="layout single-column">
  <section class="panel">
    <div class="panel-head">
      <div>
        <h2>Diagnostic Plots</h2>
        <span>Generated plots for model diagnostics</span>
      </div>
    </div>

    <div class="plots-grid">
      {% if not images %}
        <div class="note">No plots available. Rebuild artifacts to generate plots.</div>
      {% else %}
        {% for img in images %}
        <figure style="margin-bottom:18px;">
          <img src="{{ url_for('download_plot', filename=img) }}" alt="{{ img }}" style="max-width:100%; height:auto; border:1px solid #ddd; padding:6px; background:white;"/>
          <figcaption style="margin-top:6px; display:flex; justify-content:space-between; align-items:center;">
            <span>{{ img }}</span>
            <a href="{{ url_for('download_plot', filename=img) }}" class="ghost">Download</a>
          </figcaption>
        </figure>
        {% endfor %}
      {% endif %}
    </div>
  </section>
</main>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='app.js') }}"></script>
{% endblock %}
